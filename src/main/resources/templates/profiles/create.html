<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head-resources}"></th:block>
    <title>Nouveau Profil — Prime Video</title>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #1a1d24 0%, #080a0f 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .glass-container {
            background: rgba(20, 24, 33, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.02);
            animation: fadeInScale 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 40px;
            color: #fff;
            background: linear-gradient(135deg, #fff 0%, #00a8e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .custom-input, .custom-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            font-family: inherit;
        }

        .custom-input:focus, .custom-select:focus {
            outline: none;
            border-color: #00a8e1;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(0, 168, 225, 0.3);
        }

        .avatar-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }

        .avatar-scroll::-webkit-scrollbar { display: none; }

        .avatar-item {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.05);
            padding: 10px;
        }

        .avatar-item:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
        }

        .avatar-item.selected {
            border-color: #00a8e1;
            background: rgba(0, 168, 225, 0.15);
            box-shadow: 0 0 25px rgba(0, 168, 225, 0.5);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .checkbox-container:hover {
            background: rgba(255,255,255,0.07);
        }

        .checkbox-container input {
            width: 20px;
            height: 20px;
            accent-color: #00a8e1;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            padding: 18px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-cancel {
            flex: 1;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
        }

        .btn-submit {
            flex: 2;
            background: linear-gradient(135deg, #00a8e1 0%, #0056b3 100%);
            color: #fff;
            box-shadow: 0 10px 25px rgba(0, 168, 225, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 168, 225, 0.5);
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Nouveau profil</h1>
        
        <form th:action="@{/profiles/create}" th:object="${profile}" method="post">
            <div class="form-group">
                <label for="name">Nom du profil</label>
                <input type="text" id="name" th:field="*{name}" class="custom-input" placeholder="Comment vous appelez-vous ?" required maxlength="20">
            </div>

            <div class="form-group">
                <label>Choisir un avatar</label>
                <div class="avatar-scroll">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P1" class="avatar-item selected" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P1')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P2" class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P2')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P3" class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P3')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P4" class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P4')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P5" class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P5')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P6" class="avatar-item" onclick="selectAvatar(this, 'https://api.dicebear.com/7.x/bottts/svg?seed=P6')">
                </div>
                <input type="hidden" id="avatarUrl" th:field="*{avatarUrl}" value="https://api.dicebear.com/7.x/bottts/svg?seed=P1">
            </div>

            <label class="checkbox-container">
                <input type="checkbox" th:field="*{isKids}">
                <span>Profil Enfant (Contenu sécurisé)</span>
            </label>

            <div class="form-group">
                <label for="pin">Code PIN (Optionnel)</label>
                <input type="password" id="pin" th:field="*{pin}" class="custom-input" placeholder="4 chiffres pour sécuriser ce profil" maxlength="4">
            </div>

            <div class="form-group">
                <label for="ageRating">Limite d'âge (Restriction de contenu)</label>
                <select id="ageRating" th:field="*{ageRating}" class="custom-select">
                    <option value="ALL">Tout public (Aucun contenu déconseillé)</option>
                    <option value="R_16">Déconseillé aux moins de 16 ans</option>
                    <option value="R_18">Déconseillé aux moins de 18 ans</option>
                    <option value="NONE">Aucune restriction (Accès total)</option>
                </select>
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 8px;">
                    Les contenus au-dessus de cette limite seront masqués pour ce profil.
                </p>
            </div>

            <div class="btn-group">
                <a th:href="@{/profiles/select}" class="btn btn-cancel">Annuler</a>
                <button type="submit" class="btn btn-submit">Créer le profil</button>
            </div>
        </form>
    </div>

    <script>
        function selectAvatar(el, url) {
            document.querySelectorAll('.avatar-item').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('avatarUrl').value = url;
        }
    </script>

</body>
</html>
