<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head-resources}"></th:block>
    <title>Catalogue — PrimeVideo</title>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="main-content">
    <div class="page-container">
        <div class="catalog-header">
            <h1 class="page-title"><i class="fas fa-clapperboard" style="color: var(--accent); margin-right: 10px;"></i> CATALOGUE</h1>

            <!-- Recherche Interne au Catalogue -->
            <div class="catalog-search-wrapper">
                <form th:action="@{/search}" method="get" id="catalogSearchForm">
                    <i class="fas fa-search" style="opacity: 0.5; margin-right: 15px;"></i>
                    <input type="text" name="q" placeholder="Rechercher un film, une série..." />
                    <input type="file" id="imageSearchInput" style="display: none;" accept="image/*">
                    
                    <div style="display: flex; align-items: center; gap: 15px; margin-left: 15px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px;">
                        <button type="button" id="voiceSearchBtn" title="Recherche vocale" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;"><i class="fas fa-microphone"></i></button>
                        <button type="button" onclick="document.getElementById('imageSearchInput').click()" title="Recherche par image" style="background: none; border: none; color: #00ffcc; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;"><i class="fas fa-camera"></i></button>
                    </div>
                </form>
            </div>


            
        </div>
        </div>

        <!-- Grille de contenus -->
        <div class="content-grid" th:if="${contents != null and not contents.isEmpty()}">
            <div th:each="content : ${contents}" class="content-card">
                <a th:href="@{/catalog/{id}(id=${content.id})}">
                    <div class="card-poster">
                        <img th:src="${content.posterUrl != null ? content.posterUrl : '/images/placeholder.jpg'}"
                             th:alt="${content.title}" class="poster-img" loading="lazy"/>
                        <div class="card-overlay"><span class="play-btn"><i class="fas fa-play"></i></span></div>
                        <span th:if="${content.isPremium}" class="badge-premium"><i class="fas fa-crown" style="font-size: 10px; margin-right: 4px;"></i> PREMIUM</span>
                    </div>
                    
                    <!-- NOUVEAU HOVER PANEL (Style Netflix) -->
                    <div class="hover-panel">
                        <div class="hover-actions">
                            <button type="button" class="hover-btn play-btn-small" th:onclick="'window.location.href=\'/watch/' + ${content.id} + '\''" title="Lecture"><i class="fas fa-play" style="margin-left:2px;"></i></button>
                            <button type="button" class="hover-btn add-btn-small" title="Ajouter à ma liste" sec:authorize="isAuthenticated()" th:onclick="'toggleWatchlist(' + ${content.id} + '); event.preventDefault();'"><i class="fas fa-plus"></i></button>
                            <button type="button" class="hover-btn like-btn-small" title="J'aime" th:onclick="'event.preventDefault();'"><i class="fas fa-thumbs-up"></i></button>
                            <button type="button" class="hover-btn more-btn-small" title="Plus d'infos" style="margin-left: auto;" th:onclick="'window.location.href=\'/catalog/' + ${content.id} + '\''"><i class="fas fa-chevron-down"></i></button>
                        </div>
                        <div class="hover-meta">
                            <span class="age-rating" th:text="${content.ageRating} + '+'">16+</span>
                            <span class="duration" th:if="${content.type.name() == 'FILM' or content.type.name() == 'DOCUMENTAIRE' or content.type.name() == 'AFRICAIN'}" th:text="${content.durationFormatted}">2 h 14 min</span>
                            <span class="duration" th:if="${content.type.name() == 'SERIE' or content.type.name() == 'ANIME' or content.type.name() == 'KDRAMA'}">
                                <th:block th:if="${content.animeMetadata != null}" th:text="${content.animeMetadata.episodeCount} + ' Épisodes'"></th:block>
                                <th:block th:if="${content.kdramaMetadata != null}" th:text="${content.kdramaMetadata.episodeCount} + ' Épisodes'"></th:block>
                                <!-- Fallback if no specific metadata -->
                                <th:block th:if="${content.animeMetadata == null and content.kdramaMetadata == null and content.seasons != null}">
                                    <span th:text="${content.seasons.size()} + ' Saisons'"></span>
                                </th:block>
                            </span>
                            <span class="hd-badge">HD</span>
                        </div>
                        <div class="hover-tags">
                            <span th:text="${content.genre}">Genre</span>
                        </div>
                    </div>
</a>
            </div>
        </div>

        <div th:if="${contents == null or contents.isEmpty()}" class="empty-state">
            <p>Aucun contenu disponible dans cette catégorie.</p>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${contents != null and contents.totalPages > 1}">
            <a th:if="${contents.hasPrevious()}"
               th:href="@{/catalog(page=${contents.number - 1}, type=${currentType})}"
               class="page-btn">← Précédent</a>
            <span class="page-info"
                  th:text="'Page ' + ${contents.number + 1} + ' sur ' + ${contents.totalPages}">Page 1</span>
            <a th:if="${contents.hasNext()}"
               th:href="@{/catalog(page=${contents.number + 1}, type=${currentType})}"
               class="page-btn">Suivant →</a>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
