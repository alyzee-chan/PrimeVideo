<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ma Liste — Prime Video</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .watchlist-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .watchlist-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .watchlist-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .watchlist-item:hover .item-overlay {
            opacity: 1;
        }

        .item-title {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .btn-remove-watchlist {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-remove-watchlist:hover {
            background: rgba(255, 71, 87, 0.8);
        }

        .empty-watchlist {
            text-align: center;
            padding: 100px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.05);
        }

        .empty-watchlist i {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="cosmic-theme">
<div th:replace="~{layout :: navbar}"></div>

<main class="main-content">
    <div class="page-container">
        <header class="page-header">
            <h1 class="page-title"><i class="fas fa-plus"></i> Ma Liste</h1>
            <p class="page-subtitle">Les films et séries que vous avez enregistrés pour plus tard.</p>
        </header>

        <div th:if="${#lists.isEmpty(watchlist)}" class="empty-watchlist">
            <i class="fas fa-bookmark"></i>
            <h2>Votre liste est vide</h2>
            <p>Ajoutez des titres à votre liste pour les retrouver facilement ici.</p>
            <a th:href="@{/catalog}" class="btn-primary" style="margin-top: 20px; display: inline-block;">
                Parcourir le catalogue
            </a>
        </div>

        <div th:if="${not #lists.isEmpty(watchlist)}" class="watchlist-grid">
            <div th:each="item : ${watchlist}" class="watchlist-item">
                <img th:src="${item.content.posterUrl != null ? item.content.posterUrl : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=2070&auto=format&fit=crop'}" 
                     th:alt="${item.content.title}"/>
                
                <div class="item-overlay">
                    <span class="item-title" th:text="${item.content.title}">Titre du film</span>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <a th:href="@{/catalog/{id}(id=${item.content.id})}" class="btn-icon">
                            <i class="fas fa-play"></i>
                        </a>
                        <button class="btn-remove-watchlist" 
                                th:onclick="'removeFromWatchlist(' + ${profileId} + ',' + ${item.content.id} + ')'">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function removeFromWatchlist(profileId, contentId) {
        fetch(`/api/profiles/${profileId}/watchlist/${contentId}`, {
            method: 'DELETE'
        }).then(response => {
            if (response.ok) {
                window.location.reload();
            }
        });
    }
</script>

<div th:replace="~{layout :: footer}"></div>
</body>
</html>
