                  contentId:
                    type: string
                  episodeId:
                    type: string
                    nullable: true
                  chapters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chapter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /player/quality-report:
    post:
      tags:
      - Player
      summary: Signaler un problème de qualité vidéo
      operationId: reportQualityIssue
      description: 'Permet à l''utilisateur de signaler un problème de qualité de streaming (mises en mémoire tampon, artefacts,
        désynchronisation audio/vidéo...).

        Ces rapports alimentent l''équipe technique de Prime Video pour améliorer la qualité de streaming. Les données sont
        anonymisées automatiquement.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sessionId
              - issueType
              properties:
                sessionId:
                  type: string
                issueType:
                  type: string
                  enum:
                  - BUFFERING
                  - POOR_VIDEO_QUALITY
                  - AUDIO_VIDEO_SYNC
                  - NO_AUDIO
                  - NO_VIDEO
                  - SUBTITLE_SYNC
                  - CRASH
                  - OTHER
                description:
                  type: string
                  maxLength: 500
                  description: Description optionnelle du problème
                positionSeconds:
                  type: integer
                  description: Position dans le contenu où le problème s'est produit
                deviceInfo:
                  type: object
                  properties:
                    deviceId:
                      type: string
                    networkType:
                      type: string
                      enum:
                      - WIFI
                      - CELLULAR_4G
                      - CELLULAR_5G
                      - ETHERNET
                      - UNKNOWN
                    downloadSpeedMbps:
                      type: number
      responses:
        '201':
          description: Rapport de qualité enregistré
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId:
                    type: string
                  message:
                    type: string
                    example: Merci pour votre retour. Notre équipe technique analysera ce problème.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /search/by-image/feedback/{jobId}:
