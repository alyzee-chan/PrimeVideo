      operationId: getChapters
      description: 'Retourne les chapitres détectés dans un contenu par l''IA d''analyse vidéo.

        **Types de chapitres :** - `INTRO` : générique de début (avec bouton "Passer" automatique) - `RECAP` : résumé des
        épisodes précédents - `CREDITS` : générique de fin (avec lecture automatique suivant) - `POST_CREDITS` : scène post-générique
        - `CHAPTER` : chapitre numéroté du contenu

        **Utilité :** permet au lecteur d''afficher des marqueurs sur la barre de progression et des boutons contextuels (Passer
        l''intro, Épisode suivant...).

        '
      parameters:
