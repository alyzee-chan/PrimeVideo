          type: string
          enum:
          - ALL
          - QUEUED
          - DOWNLOADING
          - COMPLETED
          - EXPIRED
          - FAILED
          default: ALL
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Liste des téléchargements
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Download'
                  totalSizeBytes:
                    type: integer
                    description: Taille totale de tous les téléchargements
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - Downloads
      summary: Démarrer un téléchargement
      operationId: createDownload
      description: 'Lance le téléchargement d''un contenu pour visionnage hors ligne.

        **Prérequis :** - L''appareil doit être enregistré sur le compte - L''utilisateur doit avoir accès au contenu (Prime
        ou acheté) - La limite de téléchargements simultanés ne doit pas être atteinte

        **Formats disponibles :** SD (700 Mo env.), HD (1,5 Go env.), Full HD (3 Go env.) Le 4K n''est pas disponible en téléchargement.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '201':
          description: Téléchargement démarré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Download'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Contenu nécessitant un achat ou une location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ce contenu est déjà téléchargé sur cet appareil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Limite de téléchargements simultanés atteinte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /downloads/{downloadId}:
