      summary: K-Dramas classiques et incontournables
      operationId: getKDramaClassics
      description: 'Retourne les K-Dramas considérés comme des incontournables absolus, ayant marqué l''histoire du genre
        ou connu un succès international majeur.

        **Exemples de classiques :** - *Boys Over Flowers* (2009) — Romance, série fondatrice de la vague Hallyu - *Winter
        Sonata* (2002) — Romance, pionnier du K-Drama international - *Jewel in the Palace (Daejanggeum)* (2003) — Historique,
        best-seller mondial - *My Love from the Star* (2013) — Romance Fantaisie - *Descendants of the Sun* (2016) — Romance/Action,
        phénomène mondial - *Goblin* (2016) — Romance Fantaisie, note maximale à sa sortie - *Crash Landing on You* (2019)
        — Romance, record Netflix - *Itaewon Class* (2020) — Drama social, webtoon adapté - *Vincenzo* (2021) — Thriller/Comédie
        noire - *Squid Game* (2021) — Thriller, phénomène mondial absolu - *Twenty-Five Twenty-One* (2022) — Romance/Youth
        - *Extraordinary Attorney Woo* (2022) — Legal/Slice of Life

        '
      security: []
      parameters:
