                    items:
                      $ref: '#/components/schemas/ImageSearchJob'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
      - ImageSearch
      summary: Effacer l'historique des recherches par image
      operationId: clearImageSearchHistory
      description: 'Efface tout l''historique des recherches par image de l''utilisateur (RGPD). Les images uploadées sont
        supprimées des serveurs Amazon.

        '
      responses:
        '204':
          description: Historique effacé
        '401':
          $ref: '#/components/responses/Unauthorized'
  /player/start:
    post:
      tags:
      - Player
      summary: Démarrer une session de lecture
      operationId: startPlayback
      description: 'Démarre une session de lecture pour un contenu vidéo.

        **Ce que retourne l''endpoint :** - URL de streaming (HLS ou DASH selon l''appareil) - Token DRM (Widevine pour Android/Web,
        FairPlay pour iOS/macOS) - Pistes audio disponibles (avec langues et codecs) - Pistes de sous-titres disponibles -
        Position de reprise automatique (là où l''utilisateur s''est arrêté) - Chapitres détectés (intro, générique de fin...)

        **Gestion du nombre de streams simultanés :** Le plan d''abonnement limite le nombre de streams simultanés (généralement
        3). Si la limite est atteinte, une erreur `429` est retournée avec la liste des appareils actifs.

        **Vérification des droits :** vérifie que l''utilisateur a accès au contenu (inclus dans Prime, loué ou acheté).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybackRequest'
      responses:
        '200':
          description: Session de lecture démarrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Accès refusé — contenu nécessitant une location ou un achat
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Error'
                - type: object
                  properties:
                    pricing:
                      $ref: '#/components/schemas/ContentPricing'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Limite de streams simultanés atteinte
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Error'
                - type: object
                  properties:
                    activeStreams:
                      type: array
                      items:
                        $ref: '#/components/schemas/Device'
  /player/sessions/{sessionId}:
    delete:
      tags:
      - Player
      summary: Terminer une session de lecture
      operationId: stopPlayback
      description: 'Termine une session de lecture active et libère un slot de stream simultané. Appelé automatiquement par
        le lecteur lors de la fermeture ou de la mise en pause prolongée.

        '
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Session terminée
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /player/sessions/{sessionId}/refresh:
    post:
      tags:
      - Player
      summary: Renouveler une session de lecture
      operationId: refreshPlaybackSession
      description: 'Renouvelle une session de lecture avant son expiration. Les sessions expirent après 4 heures — ce endpoint
        permet de les prolonger sans interrompre la lecture.

        '
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session renouvelée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /player/progress/{contentId}:
    get:
      tags:
      - Player
      summary: Récupérer la progression de visionnage
      operationId: getWatchProgress
      description: 'Retourne la progression de visionnage d''un contenu pour le profil actif. Utilisé pour afficher la barre
        de progression et proposer la reprise automatique.

        '
      parameters:
      - $ref: '#/components/parameters/ContentIdParam'
      - name: profileId
        in: query
        required: true
        schema:
          type: string
      - name: episodeId
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: Progression de visionnage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Aucune progression enregistrée pour ce contenu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
      - Player
      summary: Mettre à jour la progression (heartbeat)
      operationId: updateWatchProgress
      description: 'Met à jour la position de visionnage d''un contenu (heartbeat).

        **Appelé automatiquement par le lecteur toutes les 30 secondes** pendant la lecture. Permet la reprise automatique
        sur n''importe quel appareil.

        Un contenu est marqué comme "Terminé" (`isCompleted: true`) quand la progression dépasse 90% de la durée totale.

        C''est cet endpoint qui alimente la section "Continuer à regarder" sur la page d''accueil.

        '
      parameters:
      - $ref: '#/components/parameters/ContentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Progression mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
      - Player
      summary: Supprimer la progression
      operationId: deleteWatchProgress
      description: 'Supprime la progression de visionnage d''un contenu pour un profil. Le contenu sera traité comme non commencé
        dans les recommandations et les carousels "Continuer à regarder".

        '
      parameters:
      - $ref: '#/components/parameters/ContentIdParam'
      - name: profileId
        in: query
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Progression supprimée
        '401':
          $ref: '#/components/responses/Unauthorized'
  /player/rent:
    post:
      tags:
      - Player
      summary: Louer un contenu
      operationId: rentContent
      description: 'Loue un contenu (film non inclus dans Prime Video).

        **Conditions de location :** - Le contenu est disponible 30 jours pour être démarré - Une fois démarré, 48 heures
        pour le regarder - Peut être regardé autant de fois que souhaité dans ce délai - La location est liée au compte (pas
        transférable)

        Le paiement est débité immédiatement sur le moyen de paiement par défaut.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - contentId
              - paymentMethodId
              properties:
                contentId:
                  type: string
                quality:
                  type: string
                  enum:
                  - HD
                  - FULL_HD
                  - UHD_4K
                  default: HD
                paymentMethodId:
                  type: string
      responses:
        '200':
          description: Location confirmée
          content:
            application/json:
              schema:
                type: object
                properties:
                  rentalId:
                    type: string
                  contentId:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                    description: Date limite pour démarrer la lecture
                  startedWatchingExpiresAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: 48h après le premier lancement (null si pas encore démarré)
                  transaction:
                    $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/ValidationError'
        '402':
          description: Paiement refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /player/purchase:
    post:
      tags:
      - Player
      summary: Acheter un contenu
      operationId: purchaseContent
      description: 'Achète définitivement un contenu (accès permanent sans limite de temps).

        **Avantages de l''achat vs location :** - Accès permanent même si le contenu quitte le catalogue Prime - Disponible
        en HD ou 4K selon la version achetée - Téléchargeable sur tous les appareils du compte - Résumé dans la bibliothèque
        "Mes achats"

        Le paiement est débité immédiatement. Remboursement possible uniquement si le contenu n''a pas encore été regardé
        (dans les 7 jours).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - contentId
              - paymentMethodId
              properties:
                contentId:
                  type: string
                quality:
                  type: string
                  enum:
                  - HD
                  - FULL_HD
                  - UHD_4K
                  default: HD
                paymentMethodId:
                  type: string
      responses:
        '200':
          description: Achat confirmé
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseId:
                    type: string
                  contentId:
                    type: string
                  quality:
                    type: string
                  transaction:
                    $ref: '#/components/schemas/Transaction'
        '402':
          description: Paiement refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /player/library:
    get:
      tags:
      - Player
      summary: Bibliothèque des achats et locations
      operationId: getLibrary
      description: 'Retourne la bibliothèque de l''utilisateur : contenus achetés et locations actives (dans leur délai de
        validité). C''est l''équivalent de "Mes achats et locations" sur Amazon.

        '
      parameters:
