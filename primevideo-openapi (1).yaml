  /webtoons:
    get:
      tags:
      - Webtoon
      summary: Parcourir le catalogue Webtoon adapté
      operationId: browseWebtoons
      description: 'Catalogue dédié aux adaptations audiovisuelles de webtoons (manhwa numérique).

        **Qu''est-ce qu''un Webtoon ?** Un webtoon est une bande dessinée numérique coréenne publiée en ligne, lue verticalement
        (scroll) sur mobile. Les plateformes principales sont LINE Webtoon, KakaoPage et Naver Webtoon. De nombreux webtoons
        populaires ont été adaptés en K-Drama ou en animé.

        **Adaptations webtoon célèbres :** - *True Beauty* (Webtoon → K-Drama 2020) - *All of Us Are Dead* (Webtoon → Série
        Netflix Korea 2022) - *Sweet Home* (Webtoon → Série Netflix Korea 2020) - *Itaewon Class* (Webtoon → K-Drama 2020)
        - *Tower of God* (Webtoon → Animé 2020) - *The God of High School* (Webtoon → Animé 2020) - *Noblesse* (Webtoon →
        Animé 2020) - *Solo Leveling* (Manhwa → Animé 2024)

        **Sous-genres Webtoon :** - **Action/Fantasy** : combats, pouvoirs, monde fantastique - **Romance** : histoires d''amour,
        souvent avec éléments fantastiques - **Horror/Thriller** : horreur, suspense, survie - **Slice of Life** : quotidien,
        tranche de vie - **BL (Boys'' Love)** : romance entre personnages masculins - **GL (Girls'' Love)** : romance entre
        personnages féminines

        **Note :** cette section liste uniquement les *adaptations* audiovisuelles disponibles sur Prime Video, pas les webtoons
        originaux eux-mêmes.

        '
      security: []
      parameters:
      - name: subGenre
        in: query
        schema:
          type: string
          enum:
          - action_fantasy
          - romance
          - horror_thriller
          - slice_of_life
          - bl
          - gl
          - comedy
          - sports
      - name: adaptationType
        in: query
        description: Type d'adaptation du webtoon
        schema:
          type: string
          enum:
          - ALL
          - KDRAMA
          - ANIME
          - MOVIE
          default: ALL
      - name: platform
        in: query
        description: Plateforme webtoon d'origine
        schema:
          type: string
          enum:
          - ALL
          - LINE_WEBTOON
          - KAKAOPAGE
          - NAVER
          - LEZHIN
          default: ALL
      - name: yearFrom
        in: query
        schema:
          type: integer
      - name: yearTo
        in: query
        schema:
          type: integer
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - trending
          - rating
          - newest
          - oldest
          default: trending
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Adaptations webtoon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
