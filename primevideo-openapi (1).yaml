      summary: Suggestions d'autocomplétion
      operationId: getSearchSuggestions
      description: 'Retourne des suggestions d''autocomplétion pour la barre de recherche. À appeler à chaque frappe de l''utilisateur
        avec un debounce côté client (attendre 300ms après la dernière frappe avant d''appeler l''API).

        Les suggestions incluent des titres de films/séries, des noms d''acteurs et des genres, avec une miniature pour enrichir
        l''affichage.

        '
