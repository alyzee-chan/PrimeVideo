          $ref: '#/components/responses/Unauthorized'
  /anime:
    get:
      tags:
      - Anime
      summary: Parcourir le catalogue Anime & Manga
      operationId: browseAnime
      description: "Catalogue dédié aux animés japonais et adaptations manga. Séparé du catalogue général pour une navigation\
        \ plus précise.\n**Sous-genres disponibles :** - **Shōnen** (少年) : pour jeunes garçons — action, amitié, dépassement\
        \ de soi\n  *(Naruto, Dragon Ball, My Hero Academia, One Piece, Demon Slayer)*\n- **Shōjo** (少女) : pour jeunes filles\
        \ — romance, émotions, relations\n  *(Sailor Moon, Fruits Basket, Kimi ni Todoke)*\n- **Seinen** (青年) : pour adultes\
        \ — thèmes matures, psychologie, violence\n  *(Berserk, Attack on Titan, Vinland Saga, Vagabond)*\n- **Josei** (女性)\
        \ : pour femmes adultes — romance réaliste, quotidien\n  *(Nana, Honey and Clover, Chihayafuru)*\n- **Isekai** (異世界)\
        \ : héros transporté dans un autre monde\n  *(Re:Zero, Sword Art Online, Overlord, That Time I Got Reincarnated as\
        \ a Slime)*\n- **School Life** : tranches de vie scolaires, lycée/collège\n  *(Clannad, Toradora, K-On!)*\n- **Mecha**\
        \ : robots géants, science-fiction\n  *(Neon Genesis Evangelion, Gundam, Code Geass)*\n- **Slice of Life** : quotidien\
        \ paisible, atmosphère douce\n  *(Barakamon, Non Non Biyori, A Silent Voice)*\n- **Sports** : compétition sportive\
        \ intense\n  *(Haikyuu!!, Kuroko no Basket, Yuri!!! on Ice)*\n- **Fantasy** : univers fantastiques, magie, aventure\n\
        \  *(Fullmetal Alchemist, Fairy Tail, Made in Abyss)*\n- **Mystery/Thriller** : enquêtes, suspense, horreur psychologique\n\
        \  *(Death Note, Monster, Erased)*\n- **Ecchi** : contenu suggestif léger, réservé aux 16+ - **Classiques** : œuvres\
        \ fondatrices et incontournables du medium\n**Classement :** - Par date de parution (année de diffusion originale\
        \ au Japon) - Par note (communauté Prime Video ou note globale MyAnimeList-style) - Par popularité (nombre de vues\
        \ sur Prime Video)\n"
      security: []
      parameters:
      - name: subGenre
        in: query
        description: Sous-genre manga/animé
        schema:
          type: string
          enum:
          - shonen
          - shojo
          - seinen
          - josei
          - isekai
          - school_life
          - mecha
          - slice_of_life
          - sports
          - fantasy
          - mystery
          - ecchi
          - classics
      - name: type
        in: query
        description: Type de contenu animé
        schema:
          type: string
          enum:
          - ALL
          - SERIES
          - MOVIE
          - OVA
          - ONA
          - SPECIAL
          default: ALL
      - name: yearFrom
        in: query
        description: Année de parution (originale japonaise) — depuis
        schema:
          type: integer
          example: 2000
      - name: yearTo
        in: query
        description: Année de parution — jusqu'à
        schema:
          type: integer
          example: 2024
      - name: studio
        in: query
        description: Studio d'animation (Toei, Mappa, Ufotable, Ghibli...)
        schema:
          type: string
          example: MAPPA
      - name: status
        in: query
        description: Statut de diffusion
        schema:
          type: string
          enum:
          - ALL
          - ONGOING
          - COMPLETED
          - UPCOMING
          default: ALL
      - name: isPrime
        in: query
        schema:
          type: boolean
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - trending
          - rating
          - newest
          - oldest
          - alphabetical
          - most_episodes
          default: trending
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/AcceptLanguageParam'
      responses:
        '200':
          description: Catalogue animé
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ContentList'
                - type: object
                  properties:
                    activeFilters:
                      type: object
                      properties:
                        subGenre:
                          type: string
                        yearRange:
                          type: string
                          example: 2000 – 2024
        '400':
