      summary: Ajouter à la watchlist
      operationId: addToWatchlist
      description: 'Ajoute un contenu à la liste "Regarder plus tard" du profil. Si le contenu est déjà dans la watchlist,
        retourne `200` sans créer de doublon.

        '
      requestBody:
        content:
