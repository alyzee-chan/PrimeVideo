  /search/by-image:
    post:
      tags:
      - ImageSearch
      summary: 🔍 Identifier un film ou acteur depuis une photo
      operationId: searchByImage
      description: '**Fonctionnalité innovante — Recherche par image IA.**

        Analyse une photo uploadée pour identifier automatiquement : - Un film ou une série (affiche, scène, décor iconique)
        - Un acteur ou une actrice (portrait, photo de presse) - Un personnage fictif (costume, accessoire caractéristique)

        **Cas d''usage concrets :** - Photographier l''affiche d''un film dans la rue → trouver le film sur Prime Video -
        Voir un acteur dans un magazine → découvrir ses films disponibles - Prendre en photo la TV d''un ami → identifier
        le contenu regardé - Photographier un DVD → trouver le film en streaming

        **Technologie :** l''IA utilise la vision par ordinateur (Computer Vision) et une base de données de millions d''images
        cinéma pour la reconnaissance.

        **Traitement :** synchrone pour les images simples (< 2 sec), asynchrone pour les images complexes ou ambiguës. Dans
        ce cas, un `jobId` est retourné — utiliser `GET /search/by-image/jobs/{jobId}`.

        '
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - image
              properties:
                image:
                  type: string
                  format: binary
                  description: 'Photo à analyser. Formats acceptés : JPEG, PNG, WebP, HEIC. Taille maximale : 20 Mo. Résolution
                    minimale recommandée : 300×300 px.

                    '
                enhancedSearch:
                  type: boolean
                  default: false
                  description: 'Activer la recherche approfondie (plus précis mais plus lent — traitement asynchrone). Utile
                    pour les images peu claires ou partielles.

                    '
                returnSimilar:
                  type: boolean
                  default: true
                  description: Retourner aussi des contenus visuellement similaires
      responses:
        '200':
          description: Résultat de recherche par image (traitement synchrone)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchResult'
        '202':
          description: Traitement asynchrone — job créé, résultat disponible via polling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchJob'
        '400':
          description: Image invalide (format non supporté, trop petite, corrompue)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_IMAGE
                message: Le format d'image n'est pas supporté. Utilisez JPEG, PNG, WebP ou HEIC.
        '413':
          description: Image trop volumineuse (max 20 Mo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /search/by-image/jobs/{jobId}:
    get:
      tags:
      - ImageSearch
      summary: Récupérer le résultat d'une recherche par image
      operationId: getImageSearchJob
      description: 'Retourne l''état d''avancement et le résultat d''un job de recherche par image.

        **Statuts possibles :** - `QUEUED` : en attente de traitement (file d''attente) - `PROCESSING` : analyse de l''image
        en cours - `COMPLETED` : résultat disponible dans le champ `result` - `FAILED` : erreur de traitement (détail dans
        `error`)

        **Polling recommandé :** toutes les 500ms jusqu''à COMPLETED ou FAILED. Le traitement prend généralement 1 à 5 secondes.

        '
      security: []
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: État du job de recherche par image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSearchJob'
        '404':
          $ref: '#/components/responses/NotFound'
  /search/by-image/history:
    get:
      tags:
      - ImageSearch
      summary: Historique des recherches par image
      operationId: getImageSearchHistory
      description: 'Retourne l''historique des recherches par image effectuées par l''utilisateur connecté. Utile pour retrouver
        facilement un contenu identifié précédemment.

        '
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Historique des recherches par image
          content:
            application/json:
