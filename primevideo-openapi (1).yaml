  /catalog/{contentId}/ratings:
    parameters:
    - $ref: '#/components/parameters/ContentIdParam'
    get:
      tags:
      - Ratings
      summary: Lister les avis d'un contenu
      operationId: getContentRatings
      description: 'Retourne les avis et notes des utilisateurs pour un contenu. Inclut les statistiques agrégées (note moyenne,
        répartition par étoile).

        **Tris disponibles :** - `helpful` (défaut) : avis les plus utiles selon les votes d''autres utilisateurs - `newest`
        : avis les plus récents - `rating_desc` / `rating_asc` : par note décroissante ou croissante - `spoilers_last` : avis
        sans spoilers en premier

        **Filtres :** - `spoilersHidden` : masquer les avis contenant des spoilers - `minRating` / `maxRating` : filtrer par
        note

        '
      security: []
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - helpful
          - newest
          - rating_desc
          - rating_asc
          default: helpful
      - name: spoilersHidden
        in: query
        schema:
          type: boolean
          default: true
      - name: minRating
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 5
      - name: maxRating
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 5
      responses:
        '200':
          description: Avis et notes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingList'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - Ratings
      summary: Publier un avis
      operationId: createRating
      description: 'Publie un avis sur un contenu pour le profil actif.

        **Règles :** - Un seul avis par profil et par contenu - L''utilisateur doit avoir au moins démarré le visionnage -
        Les avis contenant des spoilers sont signalés et masqués par défaut - L''avis passe par une modération automatique
        avant publication

        La note (`score`) est obligatoire, le texte est optionnel.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingCreate'
      responses:
        '201':
          description: Avis publié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Vous avez déjà publié un avis sur ce contenu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /catalog/{contentId}/ratings/{ratingId}:
    parameters:
    - $ref: '#/components/parameters/ContentIdParam'
    - name: ratingId
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - Ratings
      summary: Récupérer un avis
      operationId: getRating
      description: Retourne le détail d'un avis spécifique.
      security: []
      responses:
        '200':
          description: Avis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Ratings
      summary: Modifier son avis
      operationId: updateRating
      description: 'Modifie son propre avis. Seul l''auteur peut modifier son avis. Après modification, l''avis repasse par
        la modération automatique.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                title:
                  type: string
                body:
                  type: string
                containsSpoilers:
                  type: boolean
      responses:
        '200':
          description: Avis modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Ratings
      summary: Supprimer son avis
      operationId: deleteRating
      description: Supprime son propre avis. Seul l'auteur peut supprimer son avis.
      responses:
        '204':
          description: Avis supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/{contentId}/ratings/{ratingId}/vote:
    post:
      tags:
      - Ratings
      summary: Voter pour un avis (utile / pas utile)
      operationId: voteRating
      description: 'Vote pour indiquer si un avis est utile ou non. Ces votes alimentent le tri par défaut ("helpful"). Un
