                  - HATE_SPEECH
                  - OTHER
                comment:
                  type: string
      responses:
        '200':
          description: Signalement enregistré
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /downloads:
    get:
      tags:
      - Downloads
      summary: Lister les téléchargements
      operationId: listDownloads
      description: 'Liste tous les téléchargements de l''utilisateur (tous appareils confondus). Inclut les téléchargements
        en cours, complétés et expirés.

        **Limites selon l''abonnement :** - Prime Standard : 25 téléchargements simultanés - Prime Video Only : 15 téléchargements
        simultanés - 4K non disponible en téléchargement - Les téléchargements expirent après 30 jours ou 48h après le premier
        lancement

        Utiliser `GET /downloads?deviceId={id}` pour filtrer par appareil.

        '
      parameters:
