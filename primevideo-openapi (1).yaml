      operationId: submitImageSearchFeedback
      description: 'Permet à l''utilisateur d''indiquer si le résultat d''une recherche par image était pertinent ou non.
        Ces retours améliorent en continu le modèle d''IA.

        **Exemple :** si l''utilisateur a photographié l''affiche du film "Inception" et que l''IA a retourné "Interstellar",
        il peut signaler l''erreur et indiquer le bon résultat attendu.

        '
      parameters:
