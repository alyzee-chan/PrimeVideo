                  - not_helpful
      responses:
        '200':
          description: Vote enregistré
          content:
            application/json:
              schema:
                type: object
                properties:
                  helpfulVotes:
                    type: integer
                  notHelpfulVotes:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/{contentId}/ratings/{ratingId}/report:
    post:
      tags:
      - Ratings
      summary: Signaler un avis
      operationId: reportRating
      description: 'Signale un avis inapproprié à l''équipe de modération. Les avis signalés sont examinés et supprimés si
        le signalement est confirmé.

        '
      parameters:
      - $ref: '#/components/parameters/ContentIdParam'
