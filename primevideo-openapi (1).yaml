                        - down
                      streaming:
                        type: string
                        enum:
                        - ok
                        - degraded
                        - down
                      recommendations:
                        type: string
                        enum:
                        - ok
                        - degraded
                        - down
                      payments:
                        type: string
                        enum:
                        - ok
                        - degraded
                        - down
        '503':
          description: API dégradée ou indisponible
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: degraded
                  message:
                    type: string
  /search/by-genre/{genreId}:
    get:
      tags:
      - Search
      summary: Parcourir par genre
      operationId: browseByGenre
      description: 'Retourne les contenus d''un genre spécifique avec tri et sous-filtres. Permet de naviguer rapidement dans
        une catégorie (Action, Comédie, Thriller...).

        **Tris disponibles :** - `trending` : les plus regardés en ce moment - `rating` : les mieux notés par les utilisateurs
        - `imdb_rating` : les mieux notés sur IMDb - `newest` : les plus récents dans le genre - `oldest` : les classiques
        du genre

        '
      security: []
      parameters:
      - name: genreId
        in: path
        required: true
        schema:
          type: string
          example: genre_action
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - MOVIE
          - SERIES
          - DOCUMENTARY
          default: ALL
      - name: isPrime
        in: query
        schema:
          type: boolean
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - trending
          - rating
          - imdb_rating
          - newest
          - oldest
          default: trending
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/AcceptLanguageParam'
      responses:
        '200':
          description: Contenus du genre demandé
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ContentList'
                - type: object
                  properties:
                    genre:
                      $ref: '#/components/schemas/Genre'
        '404':
          $ref: '#/components/responses/NotFound'
  /search/advanced:
    post:
      tags:
      - Search
      summary: Recherche avancée multi-critères
      operationId: advancedSearch
      description: 'Recherche avancée permettant de combiner de nombreux critères simultanément. Contrairement à `GET /search`,
        cet endpoint accepte un body JSON pour des critères complexes impossibles à exprimer en query params.

        **Cas d''usage :** - Trouver tous les films d''un acteur spécifique dans un genre donné - Chercher des séries avec
        une note IMDb > 8 sorties entre 2020 et 2024 - Filtrer les contenus en 4K avec Dolby Atmos disponibles en français
        - Combiner plusieurs acteurs (films avec Tom Hanks ET Tom Cruise)

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Terme de recherche textuel (optionnel si d'autres filtres sont fournis)
                  example: space
                types:
                  type: array
                  items:
                    type: string
                    enum:
                    - MOVIE
                    - SERIES
                    - DOCUMENTARY
                    - SHORT
                    - SPECIAL
                    - MINI_SERIES
                genres:
                  type: array
                  description: IDs de genres (logique OU entre eux)
                  items:
                    type: string
                  example:
                  - genre_scifi
                  - genre_action
                castPersonIds:
                  type: array
                  description: IDs d'acteurs (logique ET entre eux — films avec TOUS ces acteurs)
                  items:
                    type: string
                directorPersonIds:
                  type: array
                  items:
                    type: string
                yearFrom:
                  type: integer
                  example: 2015
                yearTo:
                  type: integer
                  example: 2024
                minImdbRating:
                  type: number
                  minimum: 0
                  maximum: 10
                  example: 7.5
                minUserRating:
                  type: number
                  minimum: 0
                  maximum: 5
                  example: 4.0
                audioLanguages:
                  type: array
                  description: Langues audio disponibles (logique ET)
                  items:
                    type: string
                  example:
                  - fr
                  - en
                subtitleLanguages:
                  type: array
                  items:
                    type: string
                countries:
                  type: array
                  description: Pays de production
                  items:
                    type: string
                  example:
                  - US
                  - GB
                studios:
                  type: array
                  items:
                    type: string
                isPrime:
                  type: boolean
                has4K:
                  type: boolean
                hasHDR:
                  type: boolean
                hasDolbyAtmos:
                  type: boolean
                hasAudioDescription:
                  type: boolean
                hasSignLanguage:
                  type: boolean
                awardWon:
                  type: string
                  description: Nom du prix remporté (ex. "Oscar")
                  example: Oscar
                sort:
                  type: string
                  enum:
                  - relevance
                  - newest
                  - oldest
                  - rating
                  - imdb_rating
                  - title_asc
                  default: relevance
                page:
                  type: integer
                  default: 1
                pageSize:
                  type: integer
                  default: 20
                  maximum: 100
      responses:
        '200':
          description: Résultats de la recherche avancée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/ValidationError'
