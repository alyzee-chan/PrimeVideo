  /search:
    get:
      tags:
      - Search
      summary: Rechercher dans le catalogue
      operationId: searchCatalog
      description: 'Recherche des contenus, acteurs et réalisateurs dans le catalogue Prime Video.

        **La recherche couvre :** - Titres de films et séries (titre original et titre localisé) - Noms d''acteurs et réalisateurs
        - Noms de personnages fictifs - Genres et collections

        **Filtres disponibles :** - `type` : restreindre à un type de contenu - `genre` : filtrer par genre - `year` : filtrer
        par année de sortie - `isPrime` : uniquement les contenus inclus dans Prime - `minRating` : note minimale

        **Langues :** le header `Accept-Language` influence la recherche (chercher "Amélie" et "Le Fabuleux Destin d''Amélie
        Poulain" retourne le même résultat).

        '
      security: []
      parameters:
      - name: q
        in: query
        required: true
        description: Terme de recherche (titre, acteur, réalisateur, personnage...)
        schema:
          type: string
          example: Breaking Bad
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/AcceptLanguageParam'
      - name: type
        in: query
        schema:
          type: string
          enum:
          - MOVIE
          - SERIES
          - DOCUMENTARY
          - SHORT
          - SPECIAL
          - MINI_SERIES
      - name: genre
        in: query
        schema:
          type: string
      - name: year
        in: query
        schema:
          type: integer
      - name: isPrime
        in: query
        schema:
          type: boolean
      - name: minRating
        in: query
        schema:
          type: number
          minimum: 0
          maximum: 5
      - name: language
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - relevance
          - newest
          - rating
          - imdb_rating
          default: relevance
      responses:
        '200':
          description: Résultats de recherche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          $ref: '#/components/responses/ValidationError'
  /search/suggestions:
    get:
      tags:
