  /profiles/{profileId}/history:
    parameters:
    - $ref: '#/components/parameters/ProfileIdParam'
    get:
      tags:
      - History
      summary: Historique de visionnage d'un profil
      operationId: getWatchHistory
      description: 'Retourne l''historique de visionnage complet d''un profil, avec la progression pour chaque contenu.

        Utilisé pour alimenter les sections : - "Continuer à regarder" (contenus en cours) - "Déjà vu" (contenus terminés)
        - Les recommandations personnalisées basées sur l''historique

