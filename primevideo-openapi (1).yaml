  /kdramas:
    get:
      tags:
      - KDrama
      summary: Parcourir le catalogue K-Drama
      operationId: browseKDramas
      description: 'Catalogue dédié aux dramas coréens (K-Drama), séparés du catalogue général pour une navigation claire
        et précise.

        **Qu''est-ce qu''un K-Drama ?** Les dramas coréens sont des séries télévisées produites en Corée du Sud, caractérisées
        par un format court (16 épisodes en moyenne), une narration soignée et des thèmes variés allant de la romance à l''action
        en passant par la satire sociale.

        **Sous-genres K-Drama :** - **Romance** : histoire d''amour principale *(Crash Landing on You, Business Proposal)*
        - **Romance Fantaisie** : romance avec éléments surnaturels *(Goblin, My Love from the Star)* - **Thriller/Noir**
        : suspense, crime, enquête *(Squid Game, Signal, Vincenzo)* - **Historique (Sageuk)** : dramas d''époque coréenne
        *(Mr. Sunshine, Kingdom)* - **Comédie** : humour, situations cocasses *(Reply 1988, What''s Wrong with Secretary Kim)*
        - **Famille** : relations familiales, générationnel *(Please Come Back, Mister)* - **Medical** : milieu hospitalier,
        médecine *(Hospital Playlist, Dr. Romantic)* - **Legal** : avocats, tribunaux, justice *(Vincenzo, Suits Korea)* -
        **School/Youth** : jeunesse, lycée, coming-of-age *(Reply 1997, Extraordinary You)* - **Politique/Espionnage** : gouvernement,
        services secrets *(Designated Survivor: 60 Days)* - **Fantaisie/Surnaturel** : pouvoirs, vampires, esprits *(Hotel
        del Luna, Goblin)* - **Webtoon Adapté** : adapté depuis un webtoon *(True Beauty, All of Us Are Dead)*

        **Particularités :** - Format court et souvent terminé (pas de saisons à rallonge) - Classé par réseaux de diffusion
        (Netflix Korea, tvN, JTBC, MBC, KBS, SBS) - Note par la communauté et popularité internationale (Hallyu Wave)

        '
      security: []
      parameters:
      - name: subGenre
        in: query
        schema:
          type: string
          enum:
          - romance
          - romance_fantasy
          - thriller
          - historical
          - comedy
          - family
          - medical
          - legal
          - school
          - political
          - fantasy
          - webtoon_adapted
      - name: network
        in: query
        description: Chaîne de diffusion originale coréenne
        schema:
          type: string
          enum:
          - tvN
          - JTBC
          - MBC
          - KBS
          - SBS
          - OCN
          - Netflix_Korea
          - Kakao_TV
      - name: yearFrom
        in: query
        schema:
          type: integer
          example: 2015
      - name: yearTo
        in: query
        schema:
          type: integer
          example: 2024
      - name: status
        in: query
        schema:
          type: string
          enum:
          - ALL
          - ONGOING
          - COMPLETED
          - UPCOMING
          default: ALL
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - trending
          - rating
          - newest
          - oldest
          - most_episodes
          default: trending
      - name: isPrime
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/AcceptLanguageParam'
      responses:
        '200':
          description: Catalogue K-Drama
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
        '400':
          $ref: '#/components/responses/ValidationError'
