  /ads/generate:
    post:
      tags:
      - AdsAI
      summary: 📺 Générer une bande-annonce ou publicité par IA
      operationId: generateAd
      description: '**Fonctionnalité innovante — Génération de publicités par intelligence artificielle.**

        Crée automatiquement une bande-annonce ou un spot publicitaire pour un contenu Prime Video en utilisant l''IA générative.

        **Comment ça fonctionne ?** 1. L''IA analyse le synopsis, le casting, les genres et les extraits vidéo du contenu
        2. Elle sélectionne les moments les plus impactants selon le ton choisi 3. Elle génère une voix off adaptée à l''audience
        cible 4. Elle compose une bande sonore originale ou sélectionne un morceau existant 5. Elle monte le tout selon les
        règles du format choisi (15s, 30s, 2min...) 6. Plusieurs variantes sont générées pour permettre l''A/B testing

        **La génération est asynchrone** (30 secondes à 5 minutes selon le format) : cet endpoint crée un job et retourne
        son ID. Utiliser `GET /ads/jobs/{jobId}` pour suivre l''avancement.

        **Cas d''usage :** - Générer une bande-annonce pour une Reel Instagram en quelques clics - Créer des variantes pour
        différentes audiences (enfants vs adultes) - Adapter le ton pour différentes plateformes (YouTube vs TikTok) - Tester
        différentes accrochent automatiquement (A/B testing)

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdGenerationRequest'
            example:
              contentId: tt0111161
              format: TRAILER_30S
              targetAudience: GENERAL
              tone: EMOTIONAL
              highlightAspects:
              - STORY
              - CAST
              - AWARDS
              includeVoiceover: true
              voiceoverLanguage: fr
              musicStyle: ORCHESTRAL
              callToAction: WATCH_NOW
              customInstructions: Insister sur le thème de la liberté et de l'amitié
      responses:
        '202':
          description: Job de génération créé — résultat disponible via polling sur GET /ads/jobs/{jobId}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdGenerationJob'
        '400':
          description: Paramètres invalides ou contenu non éligible à la génération publicitaire
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Contenu introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Limite de générations simultanées atteinte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /ads/jobs/{jobId}:
    get:
      tags:
      - AdsAI
      summary: Statut d'un job de génération publicitaire
      operationId: getAdJob
      description: 'Retourne l''état d''avancement d''un job de génération publicitaire par IA.

        **Statuts possibles :** - `QUEUED` : en attente de traitement - `ANALYZING` : analyse du contenu (synopsis, extraits,
        visuels) - `GENERATING` : génération IA en cours (voix off, montage, musique) - `POST_PROCESSING` : montage final
        et encodage vidéo - `COMPLETED` : publicité disponible via `GET /ads/{adId}` - `FAILED` : erreur de génération (détail
        dans `error`)

        **Polling recommandé :** toutes les 5 secondes jusqu''à COMPLETED ou FAILED. Le champ `estimatedCompletionAt` indique
        l''heure de fin estimée.

        '
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: État du job de génération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdGenerationJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /ads/jobs:
    get:
      tags:
      - AdsAI
      summary: Lister les jobs de génération
      operationId: listAdJobs
      description: Liste tous les jobs de génération publicitaire (en cours et passés).
      parameters:
      - $ref: '#/components/parameters/PageParam'
