        '
      responses:
        '200':
          description: Téléchargement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Download'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Downloads
      summary: Supprimer un téléchargement
      operationId: deleteDownload
      description: 'Supprime un téléchargement de l''appareil et libère l''espace de stockage. Libère également un slot de
        téléchargement (limite par compte).

        '
      responses:
        '204':
          description: Téléchargement supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /downloads/{downloadId}/pause:
    post:
      tags:
      - Downloads
      summary: Mettre en pause un téléchargement
      operationId: pauseDownload
      description: Suspend un téléchargement en cours. Peut être repris avec `POST /downloads/{id}/resume`.
      parameters:
      - name: downloadId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Téléchargement mis en pause
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Download'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /downloads/{downloadId}/resume:
    post:
      tags:
      - Downloads
      summary: Reprendre un téléchargement
      operationId: resumeDownload
      description: Reprend un téléchargement précédemment mis en pause là où il s'était arrêté.
      parameters:
      - name: downloadId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Téléchargement repris
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Download'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /subscriptions/plans:
    get:
      tags:
      - Subscriptions
      summary: Lister les plans disponibles
      operationId: listSubscriptionPlans
      description: 'Retourne tous les plans d''abonnement disponibles dans le pays de l''utilisateur.

        **Plans disponibles (France) :** - **Prime Mensuel** (8,99€/mois) : Prime Video + tous les avantages Prime - **Prime
        Annuel** (89,90€/an) : idem avec 2 mois offerts - **Prime Video Seulement** (5,99€/mois) : uniquement le streaming,
        sans les autres avantages Prime - **Prime Étudiant** (4,49€/mois) : tarif réduit sur justificatif - **Chaînes add-on**
        : CANAL+, OCS, Paramount+, Eurosport...

        '
      security: []
      parameters:
      - name: country
        in: query
        schema:
          type: string
          example: FR
      - $ref: '#/components/parameters/AcceptLanguageParam'
      responses:
        '200':
          description: Plans d'abonnement disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubscriptionPlan'
  /subscriptions/current:
    get:
      tags:
      - Subscriptions
      summary: Récupérer l'abonnement actif
      operationId: getCurrentSubscription
      description: 'Retourne l''abonnement actif de l''utilisateur avec les chaînes add-on souscrites. Inclut le statut, la
        date de renouvellement et le moyen de paiement utilisé.

        '
      responses:
        '200':
          description: Abonnement actif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Aucun abonnement actif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions:
    post:
      tags:
      - Subscriptions
      summary: Souscrire à un plan
      operationId: createSubscription
      description: 'Souscrit à un plan d''abonnement Prime Video.

        **Essai gratuit :** si `plan.trialDays > 0` et que l''utilisateur n''a jamais eu d''essai gratuit, la première période
        est offerte. Le paiement commence à la fin de l''essai.

        **Renouvellement automatique :** actif par défaut. L''utilisateur est notifié 3 jours avant chaque renouvellement.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - planId
              - paymentMethodId
              properties:
                planId:
                  type: string
                  example: plan_prime_monthly
                paymentMethodId:
                  type: string
                  example: pm_visa_1234
                enableTrial:
                  type: boolean
                  default: true
                  description: Activer l'essai gratuit si éligible
      responses:
        '201':
          description: Abonnement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSubscription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Paiement refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: L'utilisateur a déjà un abonnement actif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions/current/cancel:
    post:
      tags:
      - Subscriptions
      summary: Résilier l'abonnement
      operationId: cancelSubscription
      description: 'Résilie l''abonnement actif.

        **Important :** - L''accès reste actif jusqu''à la fin de la période payée (pas de remboursement au prorata) - Le
        renouvellement automatique est désactivé immédiatement - Une enquête de satisfaction est proposée pour comprendre
        les raisons de la résiliation - Un email de confirmation est envoyé

        La résiliation peut être annulée depuis les paramètres du compte tant que la période actuelle n''est pas terminée.

        '
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  enum:
                  - TOO_EXPENSIVE
                  - NOT_ENOUGH_CONTENT
                  - TECHNICAL_ISSUES
                  - SWITCHING_SERVICE
                  - TEMPORARY
                  - OTHER
                comment:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Abonnement résilié — accès jusqu'à fin de période
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  activeUntil:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Aucun abonnement actif à résilier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions/current/reactivate:
    post:
      tags:
      - Subscriptions
      summary: Réactiver l'abonnement résilié
      operationId: reactivateSubscription
      description: 'Réactive un abonnement résilié avant la fin de la période payée. Le renouvellement automatique est réactivé
        et l''abonnement continue normalement.

        '
      responses:
        '200':
          description: Abonnement réactivé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Aucun abonnement résilié à réactiver
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions/channels:
    get:
      tags:
      - Subscriptions
      summary: Lister les chaînes add-on disponibles
      operationId: listChannels
      description: 'Retourne les chaînes supplémentaires disponibles en add-on (CANAL+, OCS, Paramount+, Eurosport, Apple
        TV+...). Chaque chaîne peut être souscrite individuellement.

        '
      security: []
      parameters:
      - name: country
        in: query
        schema:
          type: string
          example: FR
      responses:
        '200':
          description: Chaînes disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelAddon'
  /subscriptions/channels/{channelId}/subscribe:
    post:
      tags:
      - Subscriptions
      summary: Souscrire à une chaîne add-on
      operationId: subscribeToChannel
      description: 'Souscrit à une chaîne supplémentaire (add-on). Nécessite un abonnement Prime actif. La chaîne est ajoutée
        immédiatement à l''abonnement.

        '
      parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - paymentMethodId
              properties:
                paymentMethodId:
                  type: string
      responses:
        '201':
          description: Chaîne souscrite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelAddon'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Paiement refusé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Vous êtes déjà abonné à cette chaîne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions/channels/{channelId}/cancel:
    post:
      tags:
      - Subscriptions
      summary: Résilier une chaîne add-on
      operationId: cancelChannelSubscription
      description: 'Résilie la souscription à une chaîne add-on. L''accès reste actif jusqu''à la fin de la période payée.

        '
      parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Chaîne résiliée — accès jusqu'à fin de période
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  activeUntil:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /payment-methods:
    get:
      tags:
      - Payments
      summary: Lister les moyens de paiement
      operationId: listPaymentMethods
      description: 'Liste les moyens de paiement enregistrés sur le compte. Amazon ne stocke jamais les numéros complets de
        carte — uniquement les 4 derniers chiffres (tokenisation PCI-DSS).

        '
      responses:
        '200':
          description: Moyens de paiement
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - Payments
      summary: Ajouter un moyen de paiement
      operationId: createPaymentMethod
      description: 'Ajoute un nouveau moyen de paiement.

        Le `token` est généré côté client par le SDK PSP (ex: Stripe.js) — les données de carte ne transitent pas par les
        serveurs Prime Video. Cela réduit le scope PCI-DSS et protège les données des utilisateurs.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodCreate'
      responses:
        '201':
          description: Moyen de paiement ajouté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /payment-methods/{paymentMethodId}:
    parameters:
    - name: paymentMethodId
      in: path
      required: true
      schema:
        type: string
    get:
      tags:
      - Payments
      summary: Récupérer un moyen de paiement
      operationId: getPaymentMethod
      description: Retourne le détail d'un moyen de paiement spécifique.
      responses:
        '200':
          description: Moyen de paiement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Payments
      summary: Supprimer un moyen de paiement
      operationId: deletePaymentMethod
      description: 'Supprime un moyen de paiement. Impossible de supprimer un moyen de paiement lié à un abonnement actif.
        Il faut d''abord changer le moyen de paiement de l''abonnement.

        '
      responses:
        '204':
          description: Moyen de paiement supprimé
        '400':
          description: Moyen de paiement lié à un abonnement actif — impossible de supprimer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /payment-methods/{paymentMethodId}/set-default:
    post:
      tags:
      - Payments
      summary: Définir comme moyen de paiement par défaut
      operationId: setDefaultPaymentMethod
      description: 'Définit un moyen de paiement comme moyen par défaut pour les futurs abonnements et achats. L''ancien moyen
        de paiement par défaut perd automatiquement ce statut.

        '
      parameters:
      - name: paymentMethodId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Moyen de paiement défini par défaut
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/transactions:
    get:
      tags:
      - Payments
      summary: Historique des transactions
      operationId: listTransactions
      description: 'Liste l''historique complet des transactions financières (abonnements, locations, achats, remboursements).
        Filtrable par type et période.

        '
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - SUBSCRIPTION
          - RENTAL
          - PURCHASE
          - REFUND
          - ADDON
          default: ALL
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /payments/invoices:
    get:
      tags:
      - Payments
      summary: Lister les factures
      operationId: listInvoices
      description: 'Liste toutes les factures générées automatiquement pour chaque paiement. Les factures sont conservées
        10 ans (obligation légale française). Conformes aux exigences fiscales françaises (TVA, mentions obligatoires).

        '
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Factures
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /payments/invoices/{invoiceId}/download:
    get:
      tags:
      - Payments
      summary: Télécharger une facture en PDF
      operationId: downloadInvoice
      description: 'Télécharge une facture au format PDF. Le PDF est conforme aux exigences légales françaises et peut être
        utilisé pour des remboursements professionnels.

        '
      parameters:
      - name: invoiceId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Facture PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /recommendations:
    get:
      tags:
      - Recommendations
      summary: Page d'accueil — carousels de recommandations
      operationId: getHomeRecommendations
      description: 'Retourne les carousels de la page d''accueil Prime Video personnalisés pour le profil actif.

        **Carousels typiques retournés :** - "Continuer à regarder" (contenus en cours) - "Parce que vous avez regardé {titre}"
        (recommandations basées sur l''historique) - "Tendances en France" (contenus populaires) - "Nouvelles sorties" (derniers
        ajouts) - "Prime Originals" (productions exclusives Amazon) - "Les plus notés" (meilleurs avis utilisateurs) - Carousels
        par genre (Action, Comédie, Drame...)

        L''ordre et le contenu des carousels sont personnalisés selon le profil.

        '
      parameters:
      - name: profileId
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Nombre de carousels à retourner
        schema:
          type: integer
          default: 10
          maximum: 20
      - $ref: '#/components/parameters/AcceptLanguageParam'
      responses:
        '200':
          description: Carousels de la page d'accueil
          content:
            application/json:
              schema:
                type: object
                properties:
                  profileId:
                    type: string
                  hero:
                    $ref: '#/components/schemas/ContentSummary'
                    description: Contenu mis en avant en hero banner
                  carousels:
                    type: array
                    items:
                      $ref: '#/components/schemas/Carousel'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /recommendations/for-you:
    get:
      tags:
      - Recommendations
      summary: Recommandations personnalisées
      operationId: getPersonalizedRecommendations
      description: 'Retourne des recommandations personnalisées basées sur l''historique de visionnage, les notes données
        et les genres favoris du profil actif.

        L''algorithme analyse les contenus terminés, les genres fréquentés, les acteurs et réalisateurs préférés pour proposer
        les contenus les plus susceptibles d''intéresser l''utilisateur.

        '
      parameters:
      - name: profileId
        in: query
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Recommandations personnalisées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /recommendations/trending:
    get:
      tags:
      - Recommendations
      summary: Contenus en tendance
      operationId: getTrendingContent
      description: 'Retourne les contenus les plus regardés en ce moment sur Prime Video dans le pays de l''utilisateur. Mis
        à jour toutes les heures.

        '
      security: []
      parameters:
      - name: country
        in: query
        schema:
          type: string
          example: FR
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - MOVIE
          - SERIES
          - DOCUMENTARY
          default: ALL
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Contenus en tendance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
  /recommendations/new-releases:
    get:
      tags:
      - Recommendations
      summary: Nouvelles sorties
      operationId: getNewReleases
      description: 'Retourne les contenus ajoutés au catalogue Prime Video dans les 30 derniers jours. Filtrable par type
        (film, série, documentaire) et par genre.

        '
      security: []
      parameters:
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - MOVIE
          - SERIES
          - DOCUMENTARY
          default: ALL
      - name: genre
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Nouvelles sorties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
  /recommendations/continue-watching:
    get:
      tags:
      - Recommendations
      summary: Continuer à regarder
      operationId: getContinueWatching
      description: 'Retourne les contenus commencés mais non terminés par le profil actif, triés par date de dernier visionnage
        (plus récent en premier).

        C''est la section "Continuer à regarder" affiché en haut de la page d''accueil. Inclut la progression de visionnage
        pour afficher les barres de progression.

        '
      parameters:
      - name: profileId
        in: query
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Contenus en cours
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        content:
                          $ref: '#/components/schemas/ContentSummary'
                        progress:
                          $ref: '#/components/schemas/WatchProgress'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /recommendations/prime-originals:
    get:
      tags:
      - Recommendations
      summary: Prime Originals
      operationId: getPrimeOriginals
      description: 'Retourne les productions originales Amazon Studios exclusives à Prime Video. Productions emblématiques
        : The Boys, The Marvelous Mrs. Maisel, Jack Ryan, Reacher, Rings of Power...

        '
      security: []
      parameters:
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - MOVIE
          - SERIES
          - DOCUMENTARY
          default: ALL
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - newest
          - rating
          - trending
          default: rating
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Prime Originals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentList'
  /notifications:
    get:
      tags:
      - Notifications
      summary: Lister les notifications
      operationId: listNotifications
      description: 'Liste les notifications de l''utilisateur, triées par date (plus récentes en premier).

        **Types de notifications :** - `NEW_EPISODE` : nouvel épisode disponible d''une série dans la watchlist - `NEW_CONTENT`
        : nouveau contenu ajouté correspondant aux préférences - `EXPIRING_SOON` : contenu loué/acheté bientôt expiré - `REMINDER`
        : rappel configuré pour une sortie attendue - `DOWNLOAD_COMPLETE` : téléchargement terminé - `SYSTEM` : maintenance,
        mise à jour des CGU - `PROMO` : offre promotionnelle personnalisée

        '
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - name: unreadOnly
        in: query
        schema:
          type: boolean
      - name: type
        in: query
        schema:
          type: string
          enum:
          - ALL
          - NEW_EPISODE
          - NEW_CONTENT
          - EXPIRING_SOON
          - REMINDER
          - DOWNLOAD_COMPLETE
          - SYSTEM
          - PROMO
          default: ALL
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  unreadCount:
                    type: integer
                    example: 3
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/{notificationId}/read:
    post:
      tags:
      - Notifications
      summary: Marquer une notification comme lue
      operationId: markNotificationRead
      parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Notification marquée comme lue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
