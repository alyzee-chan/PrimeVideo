  /search/by-voice:
    post:
      tags:
      - VoiceSearch
      summary: 🎙️ Rechercher par commande vocale
      operationId: searchByVoice
      description: "**Fonctionnalité — Recherche vocale.**\nAnalyse un fichier audio contenant une commande vocale de l'utilisateur\
        \ et retourne les contenus correspondants.\n**Comment ça fonctionne ?** 1. L'utilisateur parle dans son micro (TV,\
        \ téléphone, télécommande Alexa...) 2. L'audio est envoyé à cet endpoint (format MP3, WAV, OGG ou M4A) 3. Le serveur\
        \ transcrit l'audio en texte grâce à un moteur ASR\n   (Automatic Speech Recognition — Amazon Transcribe ou Whisper)\n\
        4. Le texte transcrit est passé au moteur de recherche du catalogue 5. Les résultats sont retournés avec la transcription\
        \ pour affichage\n**Commandes vocales supportées :** - Recherche simple : *\"Mets-moi Breaking Bad\"* - Par acteur\
        \ : *\"Montre-moi des films avec Tom Hanks\"* - Par genre : *\"Je veux regarder un anime shōnen\"* - Par ambiance\
        \ : *\"Un film drôle pour ce soir\"* - Navigation : *\"Reprends là où j'en étais\"*, *\"Épisode suivant\"* - Commandes\
        \ lecteur : *\"Pause\"*, *\"Avance de 10 minutes\"*, *\"Active les sous-titres\"*\n**Langues supportées :** français,\
        \ anglais, espagnol, allemand, italien, portugais, japonais, coréen.\n**Traitement :** synchrone pour les fichiers\
        \ < 10 secondes, asynchrone au-delà (retourne un `jobId`).\n"
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - audio
              properties:
                audio:
                  type: string
                  format: binary
                  description: 'Fichier audio à analyser. Formats acceptés : MP3, WAV, OGG, M4A, FLAC. Durée maximale : 30
                    secondes. Taille maximale : 5 Mo.

                    '
                language:
                  type: string
                  description: 'Langue de la commande vocale (code BCP 47). Si absent, détection automatique de la langue.

                    '
                  example: fr-FR
                  enum:
                  - fr-FR
                  - en-US
                  - en-GB
                  - es-ES
                  - de-DE
                  - it-IT
                  - pt-BR
                  - ja-JP
                  - ko-KR
                context:
                  type: string
                  enum:
                  - SEARCH
                  - PLAYBACK_CONTROL
                  - NAVIGATION
                  default: SEARCH
                  description: 'Contexte d''utilisation de la commande vocale. - SEARCH : l''utilisateur cherche un contenu
                    - PLAYBACK_CONTROL : commande sur le lecteur (pause, avance...) - NAVIGATION : navigation dans l''interface
                    (accueil, watchlist...)

                    '
                profileId:
                  type: string
                  description: Profil actif (pour personnaliser les résultats)
      responses:
        '200':
          description: Résultats de la recherche vocale (traitement synchrone)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceSearchResult'
        '202':
          description: Audio en cours de traitement — résultat disponible via polling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceSearchJob'
        '400':
          description: Audio invalide (format non supporté, trop long, inaudible)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_AUDIO
                message: Le fichier audio est invalide. Utilisez MP3, WAV, OGG ou M4A (max 30 secondes).
        '413':
          description: Fichier audio trop volumineux (max 5 Mo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Commande vocale incompréhensible ou langue non détectée
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Error'
                - type: object
                  properties:
                    suggestion:
                      type: string
                      example: 'Vouliez-vous dire : ''Breaking Bad'' ?'
  /search/by-voice/jobs/{jobId}:
    get:
      tags:
      - VoiceSearch
      summary: Résultat d'un job de recherche vocale
      operationId: getVoiceSearchJob
      description: 'Retourne l''état et le résultat d''un job de traitement audio asynchrone.

        **Statuts :** - `QUEUED` : en attente de traitement - `TRANSCRIBING` : transcription audio → texte en cours - `SEARCHING`
        : recherche dans le catalogue en cours - `COMPLETED` : résultat disponible dans le champ `result` - `FAILED` : erreur
        de traitement

        **Polling recommandé :** toutes les 500ms. Le traitement dure généralement 1 à 3 secondes.

        '
      security: []
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: État du job de recherche vocale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceSearchJob'
        '404':
          $ref: '#/components/responses/NotFound'
