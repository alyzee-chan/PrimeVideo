          - GENERATING
          - POST_PROCESSING
          - COMPLETED
          - FAILED
          default: ALL
      - name: contentId
        in: query
        description: Filtrer par contenu
        schema:
          type: string
      responses:
        '200':
          description: Jobs de génération
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdGenerationJob'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
