      responses:
        '200':
          description: Bibliothèque
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                          - PURCHASE
                          - RENTAL
                        content:
                          $ref: '#/components/schemas/ContentSummary'
                        quality:
                          type: string
                        purchasedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time
                          nullable: true
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /profiles/{profileId}/watchlist:
    parameters:
    - $ref: '#/components/parameters/ProfileIdParam'
    get:
      tags:
      - Watchlist
      summary: Récupérer la watchlist d'un profil
      operationId: getWatchlist
      description: 'Retourne la liste des contenus ajoutés à "Regarder plus tard" pour un profil. Triée par date d''ajout
        (plus récents en premier). Inclut la progression de visionnage pour les contenus déjà commencés.

        '
      parameters:
