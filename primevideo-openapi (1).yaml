        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - isRelevant
              properties:
                isRelevant:
                  type: boolean
                  description: Le résultat retourné était-il pertinent ?
                expectedContentId:
                  type: string
                  nullable: true
                  description: ID du contenu que l'utilisateur cherchait réellement
                comment:
                  type: string
                  maxLength: 200
      responses:
        '200':
          description: Retour enregistré — merci pour l'amélioration du modèle
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /ads/templates:
    get:
      tags:
      - AdsAI
      summary: Lister les modèles de publicités disponibles
      operationId: listAdTemplates
      description: 'Retourne les modèles de publicités prédéfinis que l''IA peut utiliser comme base de génération. Chaque
        modèle correspond à un style visuel et narratif particulier.

        **Exemples de modèles :** - "Blockbuster épique" : montage rapide avec musique orchestrale, effets visuels - "Intimiste
        émotionnel" : plans lents, musique acoustique, voix off chaleureuse - "Comédie rythmée" : montage comique, musique
        entraînante, accroches humoristiques - "Mystère et suspense" : plans sombres, silence progressif, révélation finale
        - "Documentaire authentique" : interview réelle, plans naturels, narration factuelle - "Réel vertical" : format 9:16
        pour Instagram/TikTok, sous-titres intégrés

        '
      security: []
      parameters:
      - name: format
        in: query
        schema:
          type: string
          enum:
          - TRAILER_15S
          - TRAILER_30S
          - TRAILER_60S
          - TRAILER_2MIN
          - SOCIAL_REEL
          - BANNER_AD
      - name: tone
        in: query
        schema:
          type: string
          enum:
          - EPIC
          - EMOTIONAL
          - HUMOROUS
          - MYSTERIOUS
          - ACTION_PACKED
          - ROMANTIC
          - THRILLING
      responses:
        '200':
          description: Modèles de publicités disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: tpl_blockbuster_30s
                        name:
                          type: string
                          example: Blockbuster épique 30s
                        description:
                          type: string
                        format:
                          type: string
                        tone:
                          type: string
                        previewUrl:
                          type: string
                          format: uri
                          description: URL d'une publicité exemple générée avec ce modèle
                        bestFor:
                          type: array
                          description: Types de contenus pour lesquels ce modèle est optimal
                          items:
                            type: string
                          example:
                          - MOVIE
                          - MINI_SERIES
